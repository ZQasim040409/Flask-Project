{% extends "base.html" %}

{% block content %}

<div class="hero">
    <h1>Welcome</h1>
    <p>Login to access your account</p>

    <a href="{{ url_for('login_page') }}" class="login-btn">
        Login
    </a>
</div>

<style>
.hero{
    text-align:center;
    margin-top:150px;
}

.login-btn{
    display:inline-block;
    padding:15px 40px;
    font-size:20px;
    font-weight:bold;
    text-decoration:none;
    color:white;
    background:#007bff;
    border-radius:50px;

    transition:all 0.3s ease;
}

.login-btn:hover{
    background:#0056b3;
    transform:translateY(-5px) scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.login-btn:active{
    transform:scale(0.95);
}
</style>

{% endblock %}
